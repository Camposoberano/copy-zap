<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyZap .AI - Máquina de Vendas Agro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #ffffff; }
        .bg-gradient-orange { background: linear-gradient(135deg, #FF6B00 0%, #FF9E00 100%); }
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .brand-orange { color: #FF6B00; }
        .bg-brand-orange { background-color: #FF6B00; }
        .border-brand-orange { border-color: #FF6B00; }
        input:focus, select:focus { border-color: #FF6B00 !important; box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.2); }
        .chip { transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .chip.active { background-color: rgba(255, 107, 0, 0.1); border-color: rgba(255, 107, 0, 0.4); color: #FF6B00; transform: scale(1.05); }
        .card-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .card-btn.active { border-color: #FF6B00; background: rgba(255, 107, 0, 0.08); transform: translateY(-4px); box-shadow: 0 10px 40px -10px rgba(255, 107, 0, 0.2); }
        .card-btn.active::after { content: ''; position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; background: #FF6B00; border-radius: 50%; box-shadow: 0 0 10px #FF6B00; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { orange: '#FF6B00', dark: '#050505' } }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen">

    <div class="max-w-4xl mx-auto p-4 md:p-10 pb-32">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-6">
            <div class="flex items-center gap-4 group cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <div class="w-14 h-14 rounded-2xl bg-gradient-orange flex items-center justify-center shadow-xl shadow-brand-orange/20 rotate-3 group-hover:rotate-0 transition-transform duration-300">
                    <i data-lucide="sprout" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-1">
                        Copyzap<span class="text-brand-orange">.AI</span>
                        <i data-lucide="sparkles" class="text-brand-orange w-5 h-5 animate-pulse ml-1 inline"></i>
                    </h1>
                    <p class="text-gray-500 text-sm font-semibold tracking-wider uppercase">Vendas que Fecham no Campo</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 bg-white/5 p-1 rounded-2xl border border-white/10 pr-4">
                <div class="bg-gradient-orange px-4 py-2 rounded-xl text-white font-bold text-sm shadow-inner shadow-white/20" id="creditDisplay">10 CRÉDITOS</div>
                <div class="flex flex-col gap-1 w-24">
                    <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-brand-orange transition-all duration-1000 ease-out" id="creditBar" style="width: 100%"></div>
                    </div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Performance</p>
                </div>
            </div>
        </header>

        <!-- Tool Selection -->
        <section class="mb-14">
            <h2 class="text-xs font-bold text-gray-400 tracking-[0.2em] mb-6 uppercase flex items-center gap-3">
                <span class="w-10 h-[2px] bg-brand-orange/30 rounded-full"></span>
                Estratégia de Vendas
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="modeGrid"></div>
        </section>

        <!-- Submode Selection (Dynamic) -->
        <section id="subModeSection" class="mb-10 min-h-[140px] animate-fade">
            <h2 id="subModeTitle" class="text-xs font-bold text-gray-400 tracking-[0.2em] mb-4 uppercase">Estado do Pecuarista</h2>
            <div id="subModeGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <!-- Context Form -->
        <section class="glass-card rounded-3xl p-6 md:p-10 border-white/5 mb-10 shadow-2xl">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 rounded-lg bg-brand-orange/10 flex items-center justify-center border border-brand-orange/20">
                    <i data-lucide="target" class="text-brand-orange w-4.5 h-4.5"></i>
                </div>
                <h2 class="text-lg font-bold text-white uppercase tracking-tight">O Que Vamos Vender?</h2>
            </div>
            
            <div class="space-y-8">
                <!-- Product -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-3 pr-2">Produto / Oferta Principal</label>
                    <input type="text" id="productInput" value="Sementes de Mega Sorgo Santa Elisa" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-700 outline-none transition-all text-lg font-medium ring-brand-orange/0 focus:ring-4">
                    <div class="flex flex-wrap gap-2 mt-4" id="productChips"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Audience -->
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-3">Público-Alvo</label>
                        <input type="text" id="audienceInput" placeholder="Ex: Pecuarista de Leite" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none transition-all font-medium ring-brand-orange/0 focus:ring-4">
                        <div class="flex flex-wrap gap-2 mt-3" id="audienceChips"></div>
                    </div>

                    <!-- Pain -->
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-3">Diferencial / Benefício Chave</label>
                        <input type="text" id="painInput" placeholder="Ex: Baixa produtividade" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none transition-all font-medium ring-brand-orange/0 focus:ring-4">
                        <div class="flex flex-wrap gap-2 mt-3" id="painChips"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-white/5">
                    <!-- Price -->
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-3">Preço / Condição (ROI)</label>
                        <input type="text" id="priceInput" placeholder="Ex: R$ 85,00 o saco ou 12x" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none transition-all font-medium">
                    </div>
                    <!-- Tone -->
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-3">Gatilho de Tom de Voz</label>
                        <div class="flex flex-wrap gap-2" id="toneChips"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Generate Button -->
        <button id="generateBtn" class="w-full py-8 px-10 rounded-3xl font-extrabold text-2xl text-white bg-gradient-orange hover:shadow-brand-orange/40 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-4 group mb-10 shadow-2xl">
            <i data-lucide="sparkles" class="w-8 h-8 group-hover:rotate-12 transition-transform"></i> GERAR COPY DE ALTA CONVERSÃO
        </button>

        <!-- Status Methodology -->
        <div id="methodology" class="hidden mb-10 text-center animate-fade">
            <p class="text-xs font-bold text-brand-orange uppercase tracking-widest flex items-center justify-center gap-3">
                <i data-lucide="shield-check" class="w-4 h-4"></i> Aplicando Técnicas: Carnegie + Belfort + Gitomer
            </p>
        </div>

        <!-- Result Output -->
        <div id="results" class="hidden space-y-6 animate-fade">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-2xl font-black text-white">📋 Sua Copy Blindada</h2>
                    <p class="text-gray-500 text-sm font-medium mt-1">Pronta para fechar vendas no WhatsApp e Campo.</p>
                </div>
                <button onclick="copyAll()" class="bg-brand-orange/10 hover:bg-brand-orange/20 text-brand-orange border border-brand-orange/20 px-6 py-3 rounded-2xl font-bold flex items-center gap-2">
                    <i data-lucide="copy" class="w-4 h-4"></i> Copiar Tudo
                </button>
            </div>
            <div id="resultsContainer" class="space-y-6"></div>
        </div>

        <footer class="mt-20 text-center pb-10 border-t border-white/5 pt-10">
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Agro Expert Sales Intelligence &copy; 2026</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script>
        const MODES = [
            { id: 'funil', title: 'Funil Whats', sub: 'O Lobo do Whats', icon: 'message-circle' },
            { id: 'legenda', title: 'Legenda Insta', sub: 'Foco em Hook', icon: 'camera' },
            { id: 'copy', title: 'Página / VSL', sub: 'Vendas Longas', icon: 'trending-up' },
            { id: 'script', title: 'Roteiro Áudio', sub: 'Conversão em Voz', icon: 'mic' }
        ];

        const SUBMODES = {
            funil: [
                { id: 'frio', icon: '❄️', title: 'Lead Frio', desc: 'Nunca te conheceu. Gatilho de Curiosidade.' },
                { id: 'quente', icon: '🔥', title: 'Lead Quente', desc: 'Já conhece. Foco em Fechamento.' },
                { id: 'sumido', icon: '👻', title: 'Lead Sumido', desc: 'Resgatar o interesse (Rapport).' },
                { id: 'caro', icon: '💸', title: 'Disse que tá caro', desc: ' ROI e Lógica (Straight Line).' }
            ],
            legenda: [ { id: 'Instagram', icon: '📸', title: 'Instagram', desc: 'Feed / Reels' }, { id: 'Facebook', icon: '📘', title: 'Facebook', desc: 'Feed' }, { id: 'YouTube Shorts', icon: '▶️', title: 'YouTube Shorts', desc: 'Shorts' } ],
            copy: [ { id: 'lp', icon: '📄', title: 'Landing Page', desc: 'Página de Vendas' }, { id: 'vsl', icon: '🎥', title: 'VSL Video', desc: 'Vídeo de Vendas' }, { id: 'email', icon: '📧', title: 'E-mail Marketing', desc: 'Sequência Consultiva' } ],
            script: [ { id: 'call', icon: '📞', title: 'Cold Call', desc: 'Ligação Ativa' }, { id: 'audio', icon: '🎙️', title: 'Áudio Whats', desc: 'Script para áudio' }, { id: 'direct', icon: '💬', title: 'Direct', desc: 'Início de conversa' } ]
        };

        const PREDEFINED_PRODUCTS = [ { icon: '🌱', label: 'Sementes de Mega Sorgo Santa Elisa' }, { icon: '🌾', label: 'Sementes de Sorgo p/ Silagem' } ];
        const PREDEFINED_AUDIENCES = [ { icon: '🥛', label: 'Pecuarista de Gado de Leite' }, { icon: '🥩', label: 'Pecuarista de Gado de Corte' }, { icon: '🚜', label: 'Produtor de Silagem' }, { icon: '🏡', label: 'Zona Rural / Agro' } ];
        const PREDEFINED_PAINS = [ { icon: '📊', label: 'Alta Produtividade (+140 ton/ha/ano)' }, { icon: '🔄', label: 'Rebrota Vigorosa (Permanente)' }, { icon: '🛡️', label: 'Alta Resistência (Seca/Pragas)' }, { icon: '🌽', label: 'Substituto do Milho (200% vol)' }, { icon: '🌿', label: 'Superior ao Capiaçu (Qualidade 80%)' } ];
        const TONES = [ { icon: '⚡', label: 'Direto e Comercial' }, { icon: '🤩', label: 'Amigável e Simples' }, { icon: '💎', label: 'Autoridade Agro' }, { icon: '🤝', label: 'Empático (Dor)' } ];

        let state = { mode: 'funil', subMode: 'frio', credits: localStorage.getItem('copyzap_credits_v3') || 10 };

        function updateUI() {
            document.getElementById('creditDisplay').innerText = `${state.credits} CRÉDITOS`;
            document.getElementById('creditBar').style.width = `${(state.credits / 10) * 100}%`;
            localStorage.setItem('copyzap_credits_v3', state.credits);

            const grid = document.getElementById('modeGrid');
            grid.innerHTML = MODES.map(m => `
                <div class="card-btn glass-card rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 ${state.mode === m.id ? 'active' : ''}" onclick="setMode('${m.id}')">
                    <i data-lucide="${m.icon}" class="w-10 h-10 ${state.mode === m.id ? 'text-brand-orange' : 'text-gray-600'}"></i>
                    <h3 class="text-sm font-bold text-white">${m.title}</h3>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">${m.sub}</p>
                </div>`).join('');

            const sGrid = document.getElementById('subModeGrid');
            const sTitle = document.getElementById('subModeTitle');
            const titles = { funil: 'Estado do Pecuarista', legenda: 'Qual plataforma?', copy: 'Tipo de Material', script: 'Tipo de Roteiro' };
            sTitle.innerText = titles[state.mode] || 'Opções';
            sGrid.innerHTML = SUBMODES[state.mode].map(s => `
                <div class="card-btn glass-card rounded-3xl p-5 flex items-center gap-6 ${state.subMode === s.id ? 'active' : ''}" onclick="setSubMode('${s.id}')">
                    <div class="text-3xl">${s.icon}</div>
                    <div class="text-left">
                        <h3 class="text-base font-bold text-white">${s.title}</h3>
                        <p class="text-[11px] text-gray-400 font-medium">${s.desc}</p>
                    </div>
                </div>`).join('');
            
            lucide.createIcons();
            renderChips();
        }

        function setMode(id) { state.mode = id; state.subMode = SUBMODES[id][0].id; updateUI(); }
        function setSubMode(id) { state.subMode = id; updateUI(); }

        function renderChips() {
            const render = (cid, list, iid) => {
                const input = document.getElementById(iid);
                document.getElementById(cid).innerHTML = list.map(item => `
                    <div class="chip text-xs font-bold px-4 py-2.5 rounded-2xl glass-card ${input.value === item.label ? 'active' : ''}" onclick="setChip('${iid}','${item.label}')">
                        <span class="mr-1">${item.icon}</span> ${item.label}
                    </div>`).join('');
            };
            render('productChips', PREDEFINED_PRODUCTS, 'productInput');
            render('audienceChips', PREDEFINED_AUDIENCES, 'audienceInput');
            render('painChips', PREDEFINED_PAINS, 'painInput');
            render('toneChips', TONES, 'toneInput');
        }

        function setChip(iid, val) { document.getElementById(iid).value = val; renderChips(); }

        async function handleGenerate() {
            if (state.credits <= 0) return alert('Acabou o milho! Recarregue seus créditos.');
            const data = {
                product: document.getElementById('productInput').value,
                audience: document.getElementById('audienceInput').value,
                pain: document.getElementById('painInput').value,
                price: document.getElementById('priceInput').value,
                mode: state.mode,
                subMode: state.subMode,
                tone: document.getElementById('toneInput').value
            };
            if(!data.product || !data.audience) return alert('Faltam dados essenciais para o fecho!');

            const btn = document.getElementById('generateBtn');
            const meth = document.getElementById('methodology');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="refresh-cw" class="animate-spin w-8 h-8"></i> Analisando Perfil do Comprador...`;
            meth.classList.remove('hidden');
            lucide.createIcons();

            try {
                const res = await fetch('proxy.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(!res.ok) throw new Error(result.message || 'Erro interno no servidor');
                if(!result.results || !Array.isArray(result.results)) {
                    console.error('Dados inválidos:', result);
                    throw new Error(result.message || 'Falha na colheita: O formato recebido é inválido. Tente novamente ou mude o Tom de Voz.');
                }

                const container = document.getElementById('resultsContainer');
                container.innerHTML = result.results.map(r => `
                    <div class="glass-card rounded-3xl p-8 border-white/5 animate-fade shadow-xl">
                        <div class="flex items-center justify-between mb-5 border-b border-white/5 pb-4">
                            <h3 class="text-brand-orange font-black text-sm uppercase tracking-widest">${r.title}</h3>
                            <button onclick="copyOne(this)" class="p-2 text-white/40 hover:text-brand-orange transition-colors"><i data-lucide="copy" class="w-5 h-5"></i></button>
                        </div>
                        <p class="text-gray-100 text-base leading-relaxed whitespace-pre-wrap font-medium">${r.content}</p>
                    </div>`).join('');

                document.getElementById('results').classList.remove('hidden');
                state.credits--;
                updateUI();
                window.scrollTo({ top: document.getElementById('results').offsetTop - 50, behavior: 'smooth' });
            } catch (err) {
                alert('Erro na colheita: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="sparkles" class="w-8 h-8"></i> GERAR COPY DE ALTA CONVERSÃO`;
                meth.classList.add('hidden');
                lucide.createIcons();
            }
        }

        function copyOne(btn) { navigator.clipboard.writeText(btn.closest('.glass-card').querySelector('p').innerText); alert('Copiado para sua linha de frente!'); }
        function copyAll() { navigator.clipboard.writeText(Array.from(document.querySelectorAll('#resultsContainer p')).map(p => p.innerText).join('\n\n---\n\n')); alert('Tudo pronto para o combate!'); }

        document.addEventListener('DOMContentLoaded', () => {
            const h = document.createElement('input'); h.type = 'hidden'; h.id = 'toneInput'; h.value = 'Autoridade Agro'; document.body.appendChild(h);
            updateUI();
            document.getElementById('generateBtn').onclick = handleGenerate;
        });
    </script>
</body>
</html>
