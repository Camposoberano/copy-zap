<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyZap .AI - Marketing para o Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #ffffff; }
        .bg-gradient-orange { background: linear-gradient(135deg, #FF6B00 0%, #FF9E00 100%); }
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .brand-orange { color: #FF6B00; }
        .bg-brand-orange { background-color: #FF6B00; }
        .border-brand-orange { border-color: #FF6B00; }
        input:focus, select:focus { border-color: #FF6B00 !important; box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.2); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#FF6B00', dark: '#050505' }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen">

    <div class="max-w-4xl mx-auto p-4 md:p-10 pb-32">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-6">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-gradient-orange flex items-center justify-center shadow-xl shadow-brand-orange/20 rotate-3">
                    <i data-lucide="sprout" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-2">
                        Copyzap<span class="text-brand-orange">.AI</span>
                    </h1>
                    <p class="text-gray-500 text-sm font-semibold tracking-wider uppercase">Marketing para o Campo</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/10 pr-4">
                <div class="bg-gradient-orange px-4 py-2 rounded-xl text-white font-bold text-sm" id="creditCount">10 CRÉDITOS</div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Bateria de IA</p>
            </div>
        </header>

        <!-- Form Section -->
        <div class="glass-card rounded-3xl p-6 md:p-10 space-y-10">
            <div class="flex items-center gap-3">
                <i data-lucide="target" class="brand-orange w-6 h-6"></i>
                <h2 class="text-lg font-bold text-white uppercase tracking-tight">Contexto da Oferta</h2>
            </div>

            <div class="space-y-8">
                <!-- Product -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3">O que você está vendendo?</label>
                    <input type="text" id="product" placeholder="Ex: Sementes de Mega Sorgo" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none transition-all text-lg font-medium">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3">Quem vai comprar?</label>
                        <input type="text" id="audience" placeholder="Ex: Pecuarista de Leite" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3">Principal Problema ou Benefício</label>
                        <input type="text" id="pain" placeholder="Ex: Baixa produção de silagem" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3">Ferramenta</label>
                        <select id="mode" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none appearance-none">
                            <option value="funil">Funil WhatsApp (4 mensagens)</option>
                            <option value="legenda">Legenda Instagram</option>
                            <option value="script">Script de Venda / Áudio</option>
                            <option value="copy">Copy Completa (Landing Page)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-3">Tom de Voz</label>
                        <select id="tone" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none appearance-none">
                            <option value="Autoridade Agro">Autoridade Agro</option>
                            <option value="Direto e Comercial">Direto e Comercial</option>
                            <option value="Amigável e Simples">Amigável e Simples</option>
                            <option value="Empático">Empático (Focado na dor)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="generateBtn" class="w-full py-6 px-10 rounded-3xl font-extrabold text-xl text-white bg-gradient-orange hover:shadow-brand-orange/30 transition-all flex items-center justify-center gap-4">
                <i data-lucide="sparkles" class="w-6 h-6"></i> GERAR TEXTO AGORA
            </button>
        </div>

        <!-- Result Section -->
        <div id="results" class="mt-20 hidden space-y-6">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black text-white">📋 Sua Colheita</h2>
                <button onclick="copyAll()" class="text-sm bg-brand-orange/10 text-brand-orange border border-brand-orange/20 px-6 py-3 rounded-2xl font-bold">Copiar Tudo</button>
            </div>
            <div id="resultsContainer" class="space-y-6"></div>
        </div>

        <footer class="mt-20 text-center text-gray-600 font-bold tracking-widest text-[10px] uppercase pb-10">
            Powered by Agro Intelligence
        </footer>
    </div>

    <script>
        const btn = document.getElementById('generateBtn');
        const resultsDiv = document.getElementById('results');
        const container = document.getElementById('resultsContainer');
        const creditDisplay = document.getElementById('creditCount');

        let credits = localStorage.getItem('copyzap_credits_simple') || 10;
        creditDisplay.innerText = `${credits} CRÉDITOS`;

        btn.onclick = async () => {
            if (credits <= 0) return alert("Créditos esgotados!");
            
            const data = {
                product: document.getElementById('product').value,
                audience: document.getElementById('audience').value,
                pain: document.getElementById('pain').value,
                mode: document.getElementById('mode').value,
                tone: document.getElementById('tone').value
            };

            if(!data.product || !data.audience) return alert("Preencha os campos principais!");

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin w-6 h-6"></i> Plantando Ideias...';
            lucide.createIcons();

            try {
                // Determine the correct API URL based on current path
                const currentPath = window.location.pathname.endsWith('/') ? window.location.pathname.slice(0, -1) : window.location.pathname;
                const apiUrl = `${currentPath}/api/generate`.replace('//', '/');

                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                if (!res.ok) throw new Error(result.message);

                container.innerHTML = '';
                result.results.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl p-6 border-white/5';
                    card.innerHTML = `<h3 class="brand-orange font-bold text-xs uppercase mb-3">${item.title}</h3>
                                     <p class="text-gray-200 whitespace-pre-wrap leading-relaxed">${item.content}</p>`;
                    container.appendChild(card);
                });

                resultsDiv.classList.remove('hidden');
                credits--;
                localStorage.setItem('copyzap_credits_simple', credits);
                creditDisplay.innerText = `${credits} CRÉDITOS`;
                window.scrollTo({ top: resultsDiv.offsetTop - 50, behavior: 'smooth' });

            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" class="w-6 h-6"></i> GERAR TEXTO AGORA';
                lucide.createIcons();
            }
        };

        function copyAll() {
            const text = Array.from(container.querySelectorAll('p')).map(p => p.innerText).join('\n\n---\n\n');
            navigator.clipboard.writeText(text);
            alert("Copiado!");
        }

        lucide.createIcons();
    </script>
</body>
</html>
